<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Test — Oposición</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOAST -->
    <div id="toast" class="toast oculto"></div>

    <!-- MODAL MODO -->
    <div id="modalModo" class="modal-overlay oculto">
        <div class="modal-card">
            <div class="modal-titulo">Elige el modo de estudio</div>
            <div class="modal-subtitulo" id="modalNombreTema"></div>
            <div class="modos-lista">
                <button class="modo-btn" data-modo="completo">
                    <span class="modo-icono">📚</span>
                    <div>
                        <div class="modo-nombre">Test completo</div>
                        <div class="modo-desc">Todas las preguntas del tema en orden aleatorio</div>
                    </div>
                </button>
                <button class="modo-btn" data-modo="pendientes">
                    <span class="modo-icono">🔖</span>
                    <div>
                        <div class="modo-nombre">Continuar donde lo dejé</div>
                        <div class="modo-desc">Solo las preguntas no realizadas aún</div>
                    </div>
                </button>
                <button class="modo-btn" data-modo="falladas" id="modoBtnFalladas">
                    <span class="modo-icono">⚑</span>
                    <div>
                        <div class="modo-nombre">Repasar falladas</div>
                        <div class="modo-desc">Solo las preguntas que fallaste</div>
                    </div>
                </button>
            </div>
            <button class="modal-cancelar" id="modalCancelar">Cancelar</button>
        </div>
    </div>

    <header>
        <div class="header-inner">
            <h1>Plataforma de Test · Oposición</h1>
            <div class="header-acciones">
                <button id="dashboardBtn" class="btn-icon" title="Dashboard global">📊</button>
                <button id="temaToggle" class="btn-icon" title="Modo oscuro">🌙</button>
                <button id="resetTodoBtn" class="btn-icon btn-danger" title="Borrar todo el progreso">🗑️</button>
            </div>
        </div>
    </header>

    <main id="app">

        <!-- DASHBOARD -->
        <section id="dashboard" class="oculto">
            <div class="section-header">
                <h2>Dashboard global</h2>
                <button id="cerrarDashboard" class="btn-cerrar">✕</button>
            </div>
            <div id="dashboardContenido"></div>
        </section>

        <!-- LISTA DE TEMAS -->
        <section id="temas">
            <h2>Elige un tema</h2>
            <div id="listaTemas"></div>
        </section>

        <!-- TEST -->
        <section id="test" class="oculto">
            <div class="barra-container">
                <div class="barra-progreso" id="barraProgreso"></div>
            </div>

            <div id="progreso"></div>
            <div id="pregunta"></div>
            <div id="opciones"></div>
            <div id="explicacion-box" class="explicacion-box oculto"></div>

            <div class="botones-test">
                <button id="siguienteBtn" class="oculto">Siguiente →</button>
                <button id="anteriorBtn" class="oculto">← Anterior</button>
                <button id="volverBtn">← Temas</button>
                <button id="reiniciarBtn">↺ Reiniciar</button>
            </div>
        </section>

        <!-- RESUMEN FINAL DETALLADO -->
        <section id="resumenFinal" class="oculto">
            <div id="resumenContenido"></div>
            <div class="botones-test">
                <button id="resumenVolverBtn">← Volver a temas</button>
                <button id="resumenRepasarBtn" class="oculto">⚑ Repasar falladas</button>
                <button id="resumenReiniciarBtn">↺ Repetir tema</button>
            </div>
        </section>

    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
